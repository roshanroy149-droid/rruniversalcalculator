<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <defs>

    <!-- Percentage: classic percent glyph -->
    <symbol id="icon-percent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="7" r="3"/>
      <circle cx="17" cy="17" r="3"/>
      <line x1="18" y1="6" x2="6" y2="18"/>
    </symbol>

    <!-- Age: hourglass -->
    <symbol id="icon-age" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h12"/>
      <path d="M6 21h12"/>
      <path d="M7 3c0 4 4 6 5 6s5-2 5-6"/>
      <path d="M7 21c0-4 4-6 5-6s5 2 5 6"/>
    </symbol>

    <!-- Currency: exchange arrows between coins -->
    <symbol id="icon-currency" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="5"/>
      <circle cx="16" cy="16" r="5"/>
      <path d="M8 6.5v3M6.7 8h2.6"/>
      <path d="M16 14.5v3M14.7 16h2.6"/>
    </symbol>

    <!-- BMI: balance scale -->
    <symbol id="icon-bmi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="3" x2="12" y2="21"/>
      <line x1="5" y1="7" x2="19" y2="7"/>
      <path d="M5 7l-3 6a3 3 0 0 0 6 0z"/>
      <path d="M19 7l-3 6a3 3 0 0 0 6 0z"/>
    </symbol>

    <!-- Loan/EMI: banknote -->
    <symbol id="icon-loan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="6" width="19" height="12" rx="2"/>
      <circle cx="12" cy="12" r="3"/>
      <line x1="6" y1="9" x2="6" y2="9.01"/>
      <line x1="18" y1="15" x2="18" y2="15.01"/>
    </symbol>

    <!-- Mortgage: house -->
    <symbol id="icon-mortgage" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 11.5L12 4l8 7.5"/>
      <path d="M6 10v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9"/>
      <path d="M10 20v-5h4v5"/>
    </symbol>

    <!-- Tax: document with lines -->
    <symbol id="icon-tax" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2.5h9l3 3V21a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1z"/>
      <path d="M14.5 2.5V6h3.5"/>
      <line x1="8" y1="11" x2="16" y2="11"/>
      <line x1="8" y1="15" x2="13" y2="15"/>
    </symbol>

    <!-- GST/VAT: stamp/seal -->
    <symbol id="icon-gst" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="9" r="6"/>
      <path d="M9 8.3l1.5 1.5L15 6.5"/>
      <path d="M8.5 14.5L6.5 21l5.5-3 5.5 3-2-6.5"/>
    </symbol>

    <!-- Days between dates: calendar -->
    <symbol id="icon-days" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4.5" width="18" height="16" rx="2"/>
      <line x1="3" y1="9.5" x2="21" y2="9.5"/>
      <line x1="8" y1="2.5" x2="8" y2="6.5"/>
      <line x1="16" y1="2.5" x2="16" y2="6.5"/>
      <line x1="7" y1="13.5" x2="10" y2="13.5"/>
      <line x1="14" y1="17.5" x2="17" y2="17.5"/>
    </symbol>

    <!-- Calorie: flame -->
    <symbol id="icon-calorie" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2.5c1 3-3 4.5-3 8a3 3 0 0 0 6 0c1 1 1.5 2.3 1.5 3.5a4.5 4.5 0 0 1-9 0c0-4.5 4.5-6 4.5-11.5z"/>
    </symbol>

    <!-- Unit converter: ruler (ties to brand) -->
    <symbol id="icon-units" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="8" width="19" height="8" rx="1.5" transform="rotate(-15 12 12)"/>
      <path d="M6.2 10.3l.7 2M9.4 9.3l.7 2M12.6 8.3l.7 2M15.8 7.3l.7 2" transform="rotate(-15 12 12)"/>
    </symbol>

    <!-- Discount: price tag -->
    <symbol id="icon-discount" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.5 3H20a1 1 0 0 1 1 1v7.5a1 1 0 0 1-.3.7l-9 9a1 1 0 0 1-1.4 0l-7-7a1 1 0 0 1 0-1.4l9-9a1 1 0 0 1 .2-.8z"/>
      <circle cx="16.5" cy="7.5" r="1.5"/>
    </symbol>

    <!-- Investment: trending chart -->
    <symbol id="icon-investment" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 18l6-7 4 4 8-9"/>
      <path d="M15 6h6v6"/>
    </symbol>

    <!-- GPA: graduation cap -->
    <symbol id="icon-gpa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9l10-4.5L22 9l-10 4.5z"/>
      <path d="M6 11.5V17c0 1.4 3 2.5 6 2.5s6-1.1 6-2.5v-5.5"/>
      <path d="M22 9v5.5"/>
    </symbol>

    <!-- Scientific: sigma / functions -->
    <symbol id="icon-scientific" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 4H6l6 8-6 8h12"/>
    </symbol>

    <!-- Tip: coin drop -->
    <symbol id="icon-tip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="6" rx="4.5" ry="2.5"/>
      <path d="M7.5 6v5c0 1.4 2 2.5 4.5 2.5s4.5-1.1 4.5-2.5V6"/>
      <path d="M12 17v3M9.5 18.5h5"/>
    </symbol>

    <!-- Password: padlock -->
    <symbol id="icon-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="10.5" width="14" height="10" rx="2"/>
      <path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/>
      <circle cx="12" cy="15" r="1.4"/>
    </symbol>

    <!-- Word count: text lines -->
    <symbol id="icon-words" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="4" y1="12" x2="16" y2="12"/>
      <line x1="4" y1="18" x2="12" y2="18"/>
    </symbol>

  </defs>
</svg>
